<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أسر قريبة | السوق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div class="market-shell dir-ltr relative grid lg:grid-cols-[420px_minmax(0,1fr)]">
      <aside class="desktop-only dir-rtl border-l border-amber-200/50 p-4 overflow-auto bg-white/75">
        <div class="card-lux space-y-3">
          <div class="flex items-start justify-between gap-2">
            <div>
              <p class="text-xs text-amber-700 tracking-[.2em]">SAAS MARKETPLACE</p>
              <h1 class="text-2xl font-extrabold text-slate-800">أسر قريبة</h1>
              <p class="text-sm text-slate-600">اكتشف مشاريع منزلية قريبة منك</p>
            </div>
            <div class="flex flex-col gap-2">
              <button id="authButton" type="button" class="rounded-xl border border-amber-300 px-3 py-2 text-xs font-bold">دخول أصحاب المشاريع</button>
              <a id="dashboardLink" href="./dashboard.html" class="hidden rounded-xl bg-amber-600 px-3 py-2 text-center text-xs font-bold text-white">لوحة التحكم</a>
            </div>
          </div>

          <input id="searchDesktop" class="w-full rounded-xl border border-amber-200 bg-white/90 px-3 py-2 text-sm" placeholder="ابحث عن مشروع أو تصنيف" />
          <div id="categoryPillsDesktop" class="flex flex-wrap gap-2"></div>
        </div>

        <section class="mt-4">
          <h2 class="mb-2 text-sm font-extrabold text-slate-700">موصى به لك</h2>
          <div id="recommendedRow" class="flex gap-2 overflow-x-auto pb-2"></div>
        </section>

        <section class="mt-4">
          <div id="businessListDesktop" class="space-y-3"></div>
          <button id="loadMoreBtn" type="button" class="mt-3 w-full rounded-xl border border-amber-300 bg-white/90 px-3 py-2 text-sm">تحميل المزيد</button>
        </section>
      </aside>

      <section class="relative h-screen dir-rtl">
        <div id="map"></div>

        <button id="toggleSheet" type="button" class="mobile-only absolute left-3 top-3 z-[700] rounded-xl border border-amber-300 bg-white/95 px-3 py-2 text-sm font-bold">القائمة</button>

        <div id="mobileSheet" class="mobile-sheet mobile-only p-4">
          <div class="mx-auto mb-3 h-1.5 w-12 rounded-full bg-slate-300"></div>
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-extrabold">الأسر المنتجة</h2>
            <button id="authButtonMobile" type="button" class="rounded-lg border border-amber-300 px-2 py-1 text-xs">حسابي</button>
          </div>
          <input id="searchMobile" class="mt-2 w-full rounded-xl border border-amber-200 bg-white/90 px-3 py-2 text-sm" placeholder="بحث" />
          <div id="categoryPillsMobile" class="mt-2 flex flex-wrap gap-2"></div>
          <div id="businessListMobile" class="mt-3 max-h-[48vh] space-y-2 overflow-auto"></div>
        </div>

        <aside id="profilePanel" class="profile-panel">
          <div id="profileContent"></div>
        </aside>
      </section>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="./config.runtime.js"></script>
    <script type="module" src="./js/pages/marketplace.js"></script>
  </body>
</html>
