<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أسر قريبة | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body class="min-h-screen">
    <div class="dir-rtl grid min-h-screen lg:grid-cols-[260px_minmax(0,1fr)]">
      <aside class="border-l border-amber-200/60 bg-white/75 p-4">
        <h1 class="text-xl font-extrabold text-slate-800">لوحة الأعمال</h1>
        <p class="mt-1 text-xs text-slate-600">إدارة مشروعك في أسر قريبة</p>

        <nav class="mt-4 space-y-2">
          <button data-nav="sectionOverview" class="w-full rounded-xl border border-amber-200 bg-white px-3 py-2 text-right text-sm">نظرة عامة</button>
          <button data-nav="sectionBusiness" class="w-full rounded-xl border border-amber-200 bg-white px-3 py-2 text-right text-sm">إدارة النشاط</button>
          <button data-nav="sectionProducts" class="w-full rounded-xl border border-amber-200 bg-white px-3 py-2 text-right text-sm">المنتجات</button>
          <button data-nav="sectionOrders" class="w-full rounded-xl border border-amber-200 bg-white px-3 py-2 text-right text-sm">الطلبات</button>
          <button data-nav="sectionAnalytics" class="w-full rounded-xl border border-amber-200 bg-white px-3 py-2 text-right text-sm">التحليلات</button>
        </nav>

        <button id="logoutBtn" class="mt-6 w-full rounded-xl bg-slate-800 px-3 py-2 text-sm font-bold text-white">تسجيل الخروج</button>
      </aside>

      <main class="p-4 lg:p-6 space-y-5">
        <section id="sectionOverview" data-section class="space-y-4">
          <h2 class="text-2xl font-extrabold">نظرة عامة</h2>
          <div class="grid gap-3 sm:grid-cols-3">
            <article class="card-lux"><p class="text-sm text-slate-500">إجمالي المشاهدات</p><p id="statViews" class="text-3xl font-extrabold text-slate-800">0</p></article>
            <article class="card-lux"><p class="text-sm text-slate-500">إجمالي النقرات</p><p id="statClicks" class="text-3xl font-extrabold text-slate-800">0</p></article>
            <article class="card-lux"><p class="text-sm text-slate-500">المفضلة</p><p id="statFavorites" class="text-3xl font-extrabold text-slate-800">0</p></article>
          </div>
        </section>

        <section id="sectionBusiness" data-section class="hidden space-y-4">
          <h2 class="text-2xl font-extrabold">إدارة النشاط</h2>
          <form id="businessForm" class="card-lux space-y-3">
            <div class="grid gap-3 sm:grid-cols-2">
              <input name="name" required placeholder="اسم النشاط" class="rounded-xl border border-amber-200 px-3 py-2" />
              <select name="category" title="تصنيف النشاط" class="rounded-xl border border-amber-200 px-3 py-2">
                <option>حلويات</option><option>طبخ منزلي</option><option>قهوة</option><option>مخبوزات</option><option>حِرَف يدوية</option>
              </select>
            </div>
            <textarea name="description" rows="3" placeholder="وصف النشاط" class="w-full rounded-xl border border-amber-200 px-3 py-2"></textarea>
            <button id="aiSuggestDescriptionBtn" type="button" class="rounded-lg border border-amber-300 px-3 py-2 text-sm">اقتراح وصف بالذكاء الاصطناعي</button>
            <div class="grid gap-3 sm:grid-cols-2">
              <input name="phone" placeholder="رقم الجوال" class="rounded-xl border border-amber-200 px-3 py-2" />
              <input name="instagram" placeholder="حساب إنستغرام" class="rounded-xl border border-amber-200 px-3 py-2" />
            </div>
            <div class="grid gap-3 sm:grid-cols-2">
              <input name="lat" type="number" step="0.000001" placeholder="Latitude" class="rounded-xl border border-amber-200 px-3 py-2" />
              <input name="lng" type="number" step="0.000001" placeholder="Longitude" class="rounded-xl border border-amber-200 px-3 py-2" />
            </div>
            <div>
              <p class="mb-2 text-sm text-slate-600">اختيار الموقع من الخريطة</p>
              <div id="locationPickerMap" class="h-56 w-full rounded-xl border border-amber-200"></div>
            </div>
            <div class="grid gap-3 sm:grid-cols-2">
              <label class="text-sm">شعار النشاط<input id="logoInput" name="logo" type="file" accept="image/*" class="mt-1 block" /></label>
              <label class="text-sm">صورة الغلاف<input id="coverInput" name="cover" type="file" accept="image/*" class="mt-1 block" /></label>
            </div>
            <div class="grid gap-3 sm:grid-cols-2">
              <img id="logoPreview" class="h-24 w-full rounded-xl object-cover bg-slate-100" alt="logo preview" />
              <img id="coverPreview" class="h-24 w-full rounded-xl object-cover bg-slate-100" alt="cover preview" />
            </div>
            <button type="submit" class="rounded-xl bg-amber-600 px-4 py-2 font-bold text-white">حفظ بيانات النشاط</button>
          </form>
        </section>

        <section id="sectionProducts" data-section class="hidden space-y-4">
          <h2 class="text-2xl font-extrabold">إدارة المنتجات</h2>
          <form id="productForm" class="card-lux space-y-3">
            <input type="hidden" name="productId" />
            <div class="grid gap-3 sm:grid-cols-2">
              <input name="name" required placeholder="اسم المنتج" class="rounded-xl border border-amber-200 px-3 py-2" />
              <input name="price" required type="number" min="0" step="0.01" placeholder="السعر" class="rounded-xl border border-amber-200 px-3 py-2" />
            </div>
            <label class="text-sm">صورة المنتج<input id="productImageInput" name="image" type="file" accept="image/*" class="mt-1 block" /></label>
            <img id="productPreview" class="h-24 w-full rounded-xl object-cover bg-slate-100" alt="product preview" />
            <button type="submit" class="rounded-xl bg-slate-800 px-4 py-2 font-bold text-white">حفظ المنتج</button>
          </form>

          <div id="productsTable"></div>
        </section>

        <section id="sectionOrders" data-section class="hidden">
          <h2 class="text-2xl font-extrabold">الطلبات</h2>
          <div class="card-lux text-sm text-slate-600">قسم جاهز للتكامل المستقبلي مع نظام الطلبات والدفع.</div>
        </section>

        <section id="sectionAnalytics" data-section class="hidden">
          <h2 class="text-2xl font-extrabold">التحليلات</h2>
          <div class="card-lux"><canvas id="viewsChart" height="120"></canvas></div>
          <div id="topProducts" class="mt-3"></div>
        </section>
      </main>
    </div>

    <script src="./config.runtime.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script type="module" src="./js/pages/dashboard.js"></script>
  </body>
</html>
