<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أسر قريبة | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body class="min-h-screen p-4 lg:p-10">
    <main class="mx-auto max-w-xl card-lux space-y-4">
      <div class="text-center">
        <p class="text-xs tracking-[.18em] text-amber-700">BUSINESS AUTH</p>
        <h1 class="text-3xl font-extrabold text-slate-800">بوابة أصحاب المشاريع</h1>
        <p class="text-sm text-slate-600">إدارة نشاطك في أسر قريبة</p>
      </div>

      <div class="grid grid-cols-2 gap-2 rounded-xl bg-amber-50 p-1">
        <button id="switchLogin" class="rounded-lg px-3 py-2 text-sm bg-amber-200">تسجيل الدخول</button>
        <button id="switchRegister" class="rounded-lg px-3 py-2 text-sm">إنشاء حساب نشاط</button>
      </div>

      <form id="loginForm" class="space-y-3">
        <input type="email" name="email" required placeholder="البريد الإلكتروني" class="w-full rounded-xl border border-amber-200 bg-white px-3 py-2" />
        <input type="password" name="password" required placeholder="كلمة المرور" class="w-full rounded-xl border border-amber-200 bg-white px-3 py-2" />
        <button type="submit" class="w-full rounded-xl bg-amber-600 px-3 py-2 font-bold text-white">دخول</button>
      </form>

      <form id="registerForm" class="hidden space-y-3">
        <input name="name" required placeholder="اسم صاحبة المشروع" class="w-full rounded-xl border border-amber-200 bg-white px-3 py-2" />
        <input type="email" name="email" required placeholder="البريد الإلكتروني" class="w-full rounded-xl border border-amber-200 bg-white px-3 py-2" />
        <input type="password" name="password" required placeholder="كلمة المرور" class="w-full rounded-xl border border-amber-200 bg-white px-3 py-2" />
        <button type="submit" class="w-full rounded-xl bg-slate-800 px-3 py-2 font-bold text-white">إنشاء الحساب</button>
      </form>

      <div class="pt-1">
        <button id="googleLogin" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">الدخول بواسطة Google</button>
      </div>

      <a href="./index.html" class="block text-center text-sm text-slate-600">العودة للسوق</a>
    </main>

    <script src="./config.runtime.js"></script>
    <script type="module" src="./js/pages/auth.js"></script>
  </body>
</html>
